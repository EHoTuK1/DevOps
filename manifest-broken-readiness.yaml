apiVersion: v1
kind: ConfigMap
metadata:
  name: lb4-config
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_CHANNEL: "orders.events"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6380
            initialDelaySeconds: 2
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-redis
          image: busybox:latest
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting redis; sleep 1; done"]
      containers:
        - name: notification-service
          image: notification-service:1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lb4-config
          command: ["python", "consumer.py"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
        - name: wait-redis
          image: busybox:latest
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting redis; sleep 1; done"]
      containers:
        - name: order-service
          image: order-service:1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: lb4-config
          command: ["python", "service.py"]