services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  order_service:
    build: ./order_service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CHANNEL: orders.events
      LOG_LEVEL: INFO
    command: sh -c "sleep 10 && python service.py"
    depends_on:
      - redis
    restart: unless-stopped

  notification_service:
    build: ./notification_service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CHANNEL: orders.events
      LOG_LEVEL: INFO
    depends_on:
      - redis
    restart: unless-stopped
